<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS 仿真桌面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #d1d1d1; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; overflow: hidden; }
        
        /* 手机容器 */
        .iphone-frame { width: 375px; height: 812px; background: #fdfdfd; border-radius: 55px; border: 12px solid #1a1a1a; position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.3); overflow: hidden; }
        
        /* 毛玻璃效果 */
        .glass { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.4); }
        
        /* 滑动容器 */
        .page-wrapper { display: flex; width: 200%; height: 100%; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .page { width: 50%; height: 100%; padding: 50px 20px 0 20px; box-sizing: border-box; }
        
        /* 图标圆角方形 */
        .app-icon { width: 60px; height: 60px; background: rgba(240, 240, 240, 0.8); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex justify-center items-center h-screen">

    <div class="iphone-frame" id="phone">
        <div class="absolute top-0 w-full px-8 py-4 flex justify-between items-center z-50 text-[14px] font-bold text-gray-700">
            <span id="time-top">09:41</span>
            <div class="flex items-center gap-1.5">
                <i class="fas fa-signal"></i><i class="fas fa-wifi"></i>
                <div class="w-7 h-3.5 border border-gray-700 rounded-sm p-[1px]"><div class="bg-gray-700 h-full w-[80%] rounded-[1px]"></div></div>
            </div>
        </div>

        <div class="page-wrapper" id="swipeArea">
            <div class="page">
                <div class="glass w-full h-32 rounded-3xl mt-4 p-4 flex flex-col justify-between shadow-sm">
                    <div class="flex justify-between items-center">
                        <div class="text-[11px] text-gray-400"><i class="fas fa-wifi mr-1"></i> <span id="time-sub">09:41</span></div>
                        <div class="text-[11px] text-gray-400">阴</div>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-sm font-medium text-gray-700">郁宅雪</span>
                        <div class="w-10 h-10 rounded-full bg-gray-300 overflow-hidden border-2 border-white"><img src="https://i.pravatar.cc/100" alt="avatar"></div>
                    </div>
                    <div class="text-[10px] text-gray-500 mt-1">词不达意是我们的通病</div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="glass rounded-3xl p-4 h-64">
                        <div class="flex items-center gap-2 mb-3"><i class="fas fa-book text-gray-600 text-xs"></i><span class="text-xs font-bold text-gray-600">每日todo list</span></div>
                        <div class="space-y-3 text-[10px] text-gray-500">
                            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-full border border-gray-400"></div> 喝够8杯水 🥛</div>
                            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-full border border-gray-400"></div> 坚持运动30min 🏃</div>
                            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-full border border-gray-400"></div> 看书阅读30min 📚</div>
                            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-full border border-gray-400"></div> 记得记账 🔥</div>
                            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-full border border-gray-400"></div> 睡觉前复盘 📝</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="glass rounded-2xl flex flex-col items-center justify-center text-gray-500"><span class="text-lg">28</span><span class="text-[8px]">日历</span></div>
                        <div class="glass rounded-2xl flex flex-col items-center justify-center text-gray-500"><i class="fas fa-snowflake"></i><span class="text-[8px]">照片</span></div>
                        <div class="glass rounded-2xl flex flex-col items-center justify-center text-gray-500"><i class="fas fa-camera"></i><span class="text-[8px]">相机</span></div>
                        <div class="glass rounded-2xl flex flex-col items-center justify-center text-gray-500"><i class="fas fa-cloud"></i><span class="text-[8px]">天气</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-4 gap-y-6 mt-8">
                    <script>
                        const apps = ["微信", "游戏", "小说", "小红书", "情侣空间", "查岗", "应用商店"];
                        apps.forEach(name => {
                            document.write(`<div class="flex flex-col items-center"><div class="app-icon text-gray-400 text-xl"><i class="fas fa-star"></i></div><span class="text-[10px] text-gray-500 mt-1">${name}</span></div>`);
                        });
                    </script>
                </div>
            </div>
            <div class="page flex items-center justify-center text-gray-400">滑动翻页</div>
        </div>

        <div class="absolute bottom-8 left-6 right-6 glass h-20 rounded-3xl flex justify-around items-center">
            <div class="flex flex-col items-center text-gray-500"><div class="app-icon w-12 h-12"><i class="fas fa-cog"></i></div><span class="text-[8px] mt-1">设置</span></div>
            <div class="flex flex-col items-center text-gray-500"><div class="app-icon w-12 h-12"><i class="fas fa-clock"></i></div><span class="text-[8px] mt-1">世界时钟</span></div>
            <div class="flex flex-col items-center text-gray-500"><div class="app-icon w-12 h-12"><i class="fas fa-comment"></i></div><span class="text-[8px] mt-1">短信</span></div>
        </div>
    </div>

    <script>
        // 实时时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('time-top').innerText = timeStr;
            document.getElementById('time-sub').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 左右滑动
        let startX = 0;
        const swipeArea = document.getElementById('swipeArea');
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            if (startX - e.changedTouches[0].clientX > 50) swipeArea.style.transform = 'translateX(-50%)';
            if (startX - e.changedTouches[0].clientX < -50) swipeArea.style.transform = 'translateX(0)';
        });
    </script>
</body>
</html>
