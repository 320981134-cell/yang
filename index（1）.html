<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简手机UI复刻</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f4f4;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --border-color: rgba(255, 255, 255, 0.8);
            --text-main: #666;
        }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 手机外壳容器 - 保持 19.5:9 比例 */
        .phone-container {
            width: 375px;
            height: 812px;
            background: linear-gradient(135deg, #fdfdfd 0%, #ebebeb 100%);
            border-radius: 40px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.25), inset 0 0 20px rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 10px;
            border: 8px solid #333; /* 模拟手机边框 */
        }

        /* 毛玻璃效果 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .icon-grid-text {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
            text-align: center;
        }

        /* 模拟图标的颗粒感/磨砂感 */
        .grainy-icon {
            background: #fff;
            position: relative;
            overflow: hidden;
        }
        .grainy-icon::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="flex justify-between items-center px-6 pt-4 pb-2 text-xs font-bold text-gray-700">
            <span>09:41</span>
            <div class="flex space-x-1 items-center">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <div class="border border-gray-700 rounded-sm px-0.5 ml-1" style="font-size: 8px;">78</div>
            </div>
        </div>

        <div class="glass-card m-2 p-4 relative h-40">
            <div class="flex justify-between items-start">
                <div class="w-16 h-16 bg-gray-200 rounded-lg flex items-center justify-center border border-white">
                    <i class="fas fa-star text-gray-400"></i>
                </div>
                <div class="absolute top-16 right-20 text-right">
                    <p class="text-sm text-gray-500 font-medium">郁宅雪</p>
                </div>
                <div class="w-14 h-14 rounded-full border-2 border-white overflow-hidden shadow-sm">
                    <img src="https://via.placeholder.com/100" alt="Avatar" class="w-full h-full object-cover">
                </div>
            </div>
            <div class="flex justify-center items-center space-x-6 mt-6 text-gray-400">
                <i class="fas fa-random text-xs"></i>
                <i class="fas fa-step-backward"></i>
                <i class="fas fa-pause-circle text-2xl text-gray-500"></i>
                <i class="fas fa-step-forward"></i>
                <i class="fas fa-redo text-xs"></i>
            </div>
        </div>

        <div class="flex px-2 space-x-4 mt-2">
            <div class="glass-card flex-1 p-3">
                <div class="flex items-center mb-2 space-x-1">
                    <div class="bg-black text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px]">
                        <i class="fas fa-bookmark"></i>
                    </div>
                    <span class="text-[10px] text-gray-400 font-bold">每日todo list</span>
                </div>
                <ul class="space-y-2">
                    <li class="flex items-center text-[10px] text-gray-500 border-b border-gray-100 pb-1">
                        <div class="w-3 h-3 rounded-full border border-gray-300 mr-2"></div> 喝够8杯水 🥛
                    </li>
                    <li class="flex items-center text-[10px] text-gray-500 border-b border-gray-100 pb-1">
                        <div class="w-3 h-3 rounded-full border border-gray-300 mr-2"></div> 坚持运动30min 🏃
                    </li>
                    <li class="flex items-center text-[10px] text-gray-500 border-b border-gray-100 pb-1">
                        <div class="w-3 h-3 rounded-full border border-gray-300 mr-2"></div> 看书阅读30min 📚
                    </li>
                    <li class="flex items-center text-[10px] text-gray-500 border-b border-gray-100 pb-1">
                        <div class="w-3 h-3 rounded-full border border-gray-300 mr-2"></div> 记得记账 🔥
                    </li>
                    <li class="flex items-center text-[10px] text-gray-500">
                        <div class="w-3 h-3 rounded-full border border-gray-300 mr-2"></div> 睡觉前复盘 📝
                    </li>
                </ul>
            </div>

            <div class="flex-1 grid grid-cols-2 gap-y-4">
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 glass-card grainy-icon flex items-center justify-center text-gray-300 text-xl">日</div>
                    <span class="icon-grid-text">日历</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 glass-card grainy-icon flex items-center justify-center text-gray-300 text-xl">
                        <i class="fas fa-certificate"></i>
                    </div>
                    <span class="icon-grid-text">照片</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 glass-card grainy-icon flex items-center justify-center text-gray-300 text-xl">
                        <i class="fas fa-camera"></i>
                    </div>
                    <span class="icon-grid-text">相机</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 glass-card grainy-icon flex items-center justify-center text-gray-300 text-xl">
                        <i class="fas fa-cloud"></i>
                    </div>
                    <span class="icon-grid-text">天气</span>
                </div>
            </div>
        </div>

        <div class="flex px-2 mt-6 space-x-4">
            <div class="flex-1 space-y-6">
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 glass-card grainy-icon rounded-full flex items-center justify-center text-gray-300 text-xl">
                        <i class="fas fa-user"></i>
                    </div>
                    <span class="icon-grid-text">通讯录</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 glass-card grainy-icon flex items-center justify-center text-gray-300 text-xl">
                        <div class="w-8 h-8 rounded-full border border-gray-200"></div>
                    </div>
                    <span class="icon-grid-text">时钟</span>
                </div>
            </div>

            <div class="glass-card flex-[1.5] p-3 relative h-44">
                <div class="flex justify-between items-start">
                    <div class="w-20 h-24 bg-white rounded-lg p-1 shadow-sm">
                        <img src="https://via.placeholder.com/80x100" class="w-full h-full object-cover rounded" alt="Pic">
                    </div>
                    <div class="text-[10px] text-gray-400 text-right">
                        <p>11月13日</p>
                        <div class="mt-4 border border-dashed border-gray-300 rounded p-1">北京 阴</div>
                    </div>
                </div>
                <div class="absolute bottom-6 right-3 text-[10px] text-gray-300 tracking-widest">
                    Top Widgets*
                </div>
            </div>
        </div>

        <div class="mt-auto mb-6 flex justify-center">
            <div class="glass-card w-[90%] h-16 flex justify-around items-center px-6">
                <div class="w-10 h-10 flex items-center justify-center text-gray-400 text-xl">
                    <i class="fas fa-phone-alt"></i>
                </div>
                <div class="w-10 h-10 flex items-center justify-center text-gray-400 text-xl">
                    <div class="w-8 h-8 rounded-full bg-gray-200 opacity-50"></div>
                </div>
            </div>
        </div>

        <div class="flex justify-center space-x-1 mb-2">
            <div class="w-1.5 h-1.5 bg-black rounded-full"></div>
            <div class="w-1.5 h-1.5 bg-gray-300 rounded-full"></div>
            <div class="w-1.5 h-1.5 bg-gray-300 rounded-full"></div>
        </div>
    </div>

</body>
</html>
