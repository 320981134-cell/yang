<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>闪粉治愈系桌面</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-gray: #888888;
            --glitter-effect: linear-gradient(45deg, #d1d1d1 25%, #f0f0f0 50%, #d1d1d1 75%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }

        /* --- 闪粉质感通用样式 --- */
        .glitter-text {
            background: var(--glitter-effect);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
            font-weight: bold;
        }

        .glitter-icon {
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
            background: #eee;
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }

        @keyframes shine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* --- 状态栏 --- */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            color: #000;
        }
        .status-right { display: flex; gap: 5px; align-items: center; }

        /* --- 顶部音乐组件 --- */
        .music-widget {
            margin: 10px 15px;
            height: 160px;
            background: #f9f9f9;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }
        .music-bg {
            width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1516617442634-75371039cb3a?q=80&w=500') center/cover;
            filter: grayscale(100%) brightness(1.2);
            opacity: 0.6;
        }
        .music-info {
            position: absolute; bottom: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .song-name { font-size: 13px; color: #555; cursor: pointer; border-bottom: 1px dashed #ccc; }
        .avatar-upload {
            width: 50px; height: 50px; border-radius: 50%;
            border: 3px solid #fff; overflow: hidden; cursor: pointer;
        }
        .avatar-upload img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 桌面网格布局 --- */
        .desktop-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 10px;
            padding: 20px;
            text-align: center;
        }

        .widget-large { grid-column: span 2; grid-row: span 2; position: relative; }
        .miffy-bunny { width: 100%; transition: transform 0.3s; }
        .step-count { position: absolute; top: 0; left: 0; font-size: 12px; color: #999; text-align: left; }

        .app-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .app-icon {
            width: 55px; height: 55px;
            background: #f2f2f2;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .app-label { font-size: 11px; color: #666; }

        /* --- 猫耳照片组件 --- */
        .cat-photo-widget {
            grid-column: span 2; grid-row: span 2;
            background: #fff; border-radius: 20px; padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }
        .cat-ears {
            position: absolute; top: -10px; left: 20px; width: 40px; height: 15px;
            display: flex; justify-content: space-between;
        }
        .ear { width: 15px; height: 15px; background: #eee; border-radius: 50% 50% 0 0; }
        .photo-area { 
            width: 100%; height: 100px; background: #eee; border-radius: 10px; 
            overflow: hidden; cursor: pointer;
        }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); }
        .photo-info { font-size: 10px; color: #aaa; margin-top: 5px; text-align: left; line-height: 1.4; }
        .editable-text:focus { outline: none; background: #f0f0f0; border-radius: 3px; }

        /* --- 分页点 --- */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .dot { width: 6px; height: 6px; background: #ddd; border-radius: 50%; cursor: pointer; }
        .dot.active { background: #999; width: 12px; border-radius: 3px; }

        /* --- 底部 Dock --- */
        .dock {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            height: 80px; background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px); border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center;
        }
        
        /* 隐藏的文件输入框 */
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div id="status-time">09:41</div>
        <div class="status-right">
            <span>📶</span>
            <span>5G</span>
            <span id="status-battery">100%</span>
            <span>🔋</span>
        </div>
    </div>

    <div class="music-widget">
        <div class="music-bg"></div>
        <div class="music-info">
            <div class="song-name" contenteditable="true" onclick="event.stopPropagation()">词不达意是我们的通病</div>
            <div class="avatar-upload" onclick="triggerUpload('avatar-input')">
                <img id="avatar-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar">
            </div>
        </div>
    </div>

    <div class="desktop-grid">
        <div class="widget-large">
            <div class="step-count">今日步数<br><strong style="font-size: 18px; color: #555;">2000</strong></div>
            <img class="miffy-bunny" src="https://img.icons8.com/plasticine/200/miffy.png" alt="bunny">
        </div>

        <div class="app-item" onclick="toast()">
            <div class="app-icon glitter-text">📅</div>
            <div class="app-label">日历</div>
        </div>
        <div class="app-item" onclick="toast()">
            <div class="app-icon glitter-text">🖼️</div>
            <div class="app-label">照片</div>
        </div>
        <div class="app-item" onclick="toast()">
            <div class="app-icon glitter-text">📷</div>
            <div class="app-label">相机</div>
        </div>
        <div class="app-item" onclick="toast()">
            <div class="app-icon glitter-text">☁️</div>
            <div class="app-label">天气</div>
        </div>

        <div class="app-item" onclick="toast()">
            <div class="app-icon glitter-text">👤</div>
            <div class="app-label">通讯录</div>
        </div>
        <div class="app-item" onclick="toast()">
            <div class="app-icon glitter-text">🕒</div>
            <div class="app-label">时钟</div>
        </div>

        <div class="app-item" onclick="toast()">
            <div class="app-icon" style="background: #e1e1e1;">🎵</div>
            <div class="app-label">抖音</div>
        </div>

        <div class="cat-photo-widget">
            <div class="cat-ears"><div class="ear"></div><div class="ear"></div></div>
            <div class="photo-area" onclick="triggerUpload('photo-input')">
                <img id="card-img" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=200" alt="photo">
            </div>
            <div class="photo-info">
                <div class="editable-text" contenteditable="true">11月13日</div>
                <div class="editable-text" contenteditable="true">北京 · 阴</div>
            </div>
        </div>
    </div>

    <div class="pagination">
        <div class="dot active"></div>
        <div class="dot" onclick="toast()"></div>
    </div>

    <div class="dock">
        <div class="app-icon glitter-text" style="font-size: 30px;" onclick="toast()">📞</div>
        <div class="app-icon glitter-text" style="font-size: 30px;" onclick="toast()">💬</div>
    </div>

    <input type="file" id="avatar-input" accept="image/*" onchange="handleFile(this, 'avatar-img')">
    <input type="file" id="photo-input" accept="image/*" onchange="handleFile(this, 'card-img')">

    <script>
        // 1. 实时获取系统时间
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('status-time').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. 实时获取电量
        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                const updateBattery = () => {
                    document.getElementById('status-battery').textContent = Math.floor(battery.level * 100) + '%';
                };
                updateBattery();
                battery.addEventListener('levelchange', updateBattery);
            });
        }

        // 3. 图片上传逻辑
        function triggerUpload(id) {
            document.getElementById(id).click();
        }

        function handleFile(input, targetId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(targetId).src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 4. 交互反馈
        function toast() {
            const msg = document.createElement('div');
            msg.style.cssText = `
                position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
                background: rgba(0,0,0,0.6); color: white; padding: 8px 16px;
                border-radius: 20px; font-size: 12px; z-index: 1000;
            `;
            msg.textContent = "功能开发中...";
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }

        // 阻止编辑文本时触发点击事件
        document.querySelectorAll('.editable-text, .song-name').forEach(el => {
            el.addEventListener('click', (e) => e.stopPropagation());
        });
    </script>
</body>
</html>
