<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS 仿真桌面 - 终极版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; user-select: none; }
        #bg-layer { width: 100vw; height: 100vh; background-size: cover; background-position: center; position: fixed; z-index: -1; }
        .swiper { display: flex; height: 100%; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .page { width: 100vw; flex-shrink: 0; padding: 60px 24px 20px 24px; box-sizing: border-box; }
        
        .glass { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .app-icon { width: 60px; height: 60px; border-radius: 14px; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; }
        
        .editing .icon-item { animation: shake 0.2s infinite alternate; }
        @keyframes shake { 0% { transform: rotate(-2deg); } 100% { transform: rotate(2deg); } }
        
        .todo-input { background: transparent; border: none; outline: none; width: 100%; font-size: 12px; color: #fff; }
    </style>
</head>
<body>

<div id="bg-layer" ondblclick="document.getElementById('bg-upload').click()"></div>
<input type="file" id="bg-upload" class="hidden" onchange="upload(this, 'bgUrl')">
<input type="file" id="av-upload" class="hidden" onchange="upload(this, 'avatar')">

<div class="swiper" id="swiper"></div>

<script>
    // --- 配置与本地存储 ---
    let pages = JSON.parse(localStorage.getItem('iosPages')) || [1];
    let todos = JSON.parse(localStorage.getItem('iosTodos')) || ["喝够8杯水 🥛", "坚持运动30min 🏃", "记得记账 🔥"];
    document.getElementById('bg-layer').style.backgroundImage = `url('${localStorage.getItem('bgUrl') || 'https://images.unsplash.com/photo-1519741497674-611481863552?q=80'}')`;

    function upload(input, key) {
        const reader = new FileReader();
        reader.onload = (e) => { localStorage.setItem(key, e.target.result); location.reload(); };
        reader.readAsDataURL(input.files[0]);
    }

    // --- 渲染逻辑 ---
    function render() {
        const swiper = document.getElementById('swiper');
        swiper.innerHTML = '';
        pages.forEach((p, i) => {
            const page = document.createElement('div');
            page.className = 'page';
            if (i === 0) {
                page.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass p-5 rounded-[30px] h-[160px] flex flex-col justify-between" onclick="document.getElementById('av-upload').click()">
                            <div class="text-[10px] text-white/70">Top Widgets+</div>
                            <img src="${localStorage.getItem('avatar') || 'https://i.pravatar.cc/100'}" class="w-10 h-10 rounded-full border border-white/50">
                        </div>
                        <div class="glass p-5 rounded-[30px] h-[160px] flex flex-col">
                            <div class="text-[10px] font-bold border-b border-white/20 pb-2 mb-2 text-white/80">每日todo list</div>
                            <div id="todo-list" class="space-y-1.5"></div>
                        </div>
                    </div>
                    <div id="icon-grid" class="grid grid-cols-4 gap-y-6 mt-8"></div>
                `;
            } else {
                page.innerHTML = `<div class="text-white text-center pt-20 text-lg">页面 ${i + 1}</div>`;
            }
            swiper.appendChild(page);
        });
        renderIcons(); renderTodos();
    }

    function renderTodos() {
        const list = document.getElementById('todo-list');
        todos.forEach((t, i) => {
            let done = JSON.parse(localStorage.getItem('d'+i));
            list.innerHTML += `<div class="flex items-center gap-1.5">
                <div onclick="toggle(${i})" class="w-3 h-3 rounded-full border border-white/60 flex items-center justify-center">${done?'<i class="fas fa-slash text-[8px] text-white"></i>':''}</div>
                <input class="todo-input ${done?'opacity-50 line-through':''}" value="${t}" onchange="update(${i}, this.value)">
            </div>`;
        });
    }

    function renderIcons() {
        const grid = document.getElementById('icon-grid');
        ['微信', '游戏', '小说', '小红书', '情侣空间', '查岗', '应用商店'].forEach(name => {
            grid.innerHTML += `<div class="icon-item"><div class="app-icon"><i class="fas fa-star text-white"></i></div><span class="text-[10px] text-white">${name}</span></div>`;
        });
        new Sortable(grid, { animation: 150 });
        grid.onmousedown = () => setTimeout(() => document.body.classList.add('editing'), 800);
        window.onmouseup = () => document.body.classList.remove('editing');
    }

    function toggle(i) { localStorage.setItem('d'+i, !JSON.parse(localStorage.getItem('d'+i))); render(); }
    function update(i, v) { todos[i] = v; localStorage.setItem('iosTodos', JSON.stringify(todos)); }
    
    // --- 页面滑动交互 ---
    let startX = 0, cur = 0;
    window.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    window.addEventListener('touchend', e => {
        let diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) {
            cur = diff > 0 ? Math.min(cur + 1, pages.length - 1) : Math.max(cur - 1, 0);
            document.getElementById('swiper').style.transform = `translateX(-${cur * 100}vw)`;
        }
    });

    render();
</script>
</body>
</html>
