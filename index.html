<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock iPhone UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 模拟 iOS 图标圆角率 */
        .ios-icon { border-radius: 22%; }
        /* 磨砂玻璃背景 */
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen font-sans">

    <div class="relative w-[375px] h-[812px] bg-[url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2000&auto=format&fit=crop')] bg-cover bg-center rounded-[50px] border-[8px] border-black shadow-2xl overflow-hidden">
        
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-7 bg-black rounded-b-3xl z-50"></div>

        <div class="relative mt-16 px-6 flex flex-col items-center">
            <div class="w-24 h-24 bg-white rounded-full border-4 border-white shadow-lg z-20 overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar">
            </div>
            <div class="w-full h-48 bg-white/30 backdrop-blur-md rounded-3xl -mt-12 z-10 p-6 pt-16 flex justify-between items-start">
                
                <div class="flex flex-col items-center space-y-1">
                    <div class="w-14 h-14 bg-blue-500 ios-icon flex items-center justify-center text-white shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <span class="text-xs text-white">邮件</span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 bg-green-500 ios-icon shadow-sm flex items-center justify-center text-[10px] text-white">微信</div>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 bg-orange-400 ios-icon shadow-sm flex items-center justify-center text-[10px] text-white">世界书</div>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 bg-gray-500 ios-icon shadow-sm flex items-center justify-center text-[10px] text-white text-center">设置</div>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 bg-pink-400 ios-icon shadow-sm flex items-center justify-center text-[10px] text-white">美化</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-6 left-4 right-4 h-24 glass rounded-[35px] flex items-center justify-around px-4">
            <div class="flex flex-col items-center space-y-1">
                <div class="w-14 h-14 bg-green-400 ios-icon flex items-center justify-center text-white text-xs">手机</div>
            </div>
            <div class="flex flex-col items-center space-y-1">
                <div class="w-14 h-14 bg-yellow-600 ios-icon flex items-center justify-center text-white text-xs">小说</div>
            </div>
            <div class="flex flex-col items-center space-y-1">
                <div class="w-14 h-14 bg-red-600 ios-icon flex items-center justify-center text-white text-xs text-[10px]">小红书</div>
            </div>
            <div class="flex flex-col items-center space-y-1">
                <div class="w-14 h-14 bg-indigo-500 ios-icon flex items-center justify-center text-white text-xs">音乐</div>
            </div>
        </div>

        <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/60 rounded-full"></div>
    </div>

</body>
</html>
