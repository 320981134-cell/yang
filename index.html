<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mobile UI Mockup</title>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --widget-bg: rgba(255, 255, 255, 0.7);
            --text-main: #666;
            --border-radius: 24px;
            --glass-blur: blur(10px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background: linear-gradient(180deg, #e0e0e0 0%, #f5f5f5 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        /* 手机容器 */
        .phone-container {
            width: 375px;
            height: 812px;
            background: #fff;
            position: relative;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 0 16px;
        }

        /* 1. 状态栏 */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-weight: bold;
            font-size: 14px;
        }

        /* 2. 顶部大组件 (音乐/媒体) */
        .top-media-widget {
            background: var(--widget-bg);
            backdrop-filter: var(--glass-blur);
            height: 180px;
            border-radius: var(--border-radius);
            margin-top: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
        }
        .media-info { display: flex; justify-content: space-between; }
        .album-art { width: 70px; height: 70px; background: #ddd; border-radius: 12px; border: 2px solid #fff; }
        .avatar-circle { width: 70px; height: 70px; background: #eee; border-radius: 50%; overflow: hidden; border: 2px solid #fff; }
        .controls { display: flex; justify-content: space-around; padding: 10px 0; font-size: 18px; }

        /* 3. 中间内容区 (Grid 布局) */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 15px;
            margin-top: 20px;
        }

        /* To-do List 组件 */
        .todo-widget {
            background: white;
            border-radius: var(--border-radius);
            padding: 15px;
            grid-row: span 2;
        }
        .todo-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 12px; }
        .todo-check { width: 14px; height: 14px; border: 1px solid #ccc; border-radius: 50%; margin-right: 8px; }

        /* 图标样式 */
        .icon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
        .app-icon { font-size: 10px; }
        .icon-shape { 
            width: 50px; height: 50px; background: #fff; border-radius: 15px; 
            margin: 0 auto 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #f0f0f0;
        }

        /* 4. 右下角组合组件 */
        .bottom-right-widget {
            background: var(--widget-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--border-radius);
            padding: 15px;
            position: relative;
        }

        /* 5. 底部 Dock 栏 */
        .dock-bar {
            height: 80px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .dock-icon { width: 50px; height: 50px; border-radius: 15px; background: #fff; }

        /* 指示点 */
        .pagination { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .dot { width: 6px; height: 6px; background: #ccc; border-radius: 50%; }
        .dot.active { background: #333; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="status-bar">
        <span>09:41</span>
        <div style="display:flex; gap:5px;">📶 5G 🔋</div>
    </div>

    <div class="top-media-widget">
        <div class="media-info">
            <div class="album-art"></div>
            <div style="text-align: right;">
                <p style="font-size: 14px; font-weight: bold;">郁宅雪</p>
                <div class="avatar-circle"></div>
            </div>
        </div>
        <div class="controls"> ⏮ ⏸ ⏭ 🔄 ⏪ ▶ ⏩ </div>
    </div>

    <div class="main-content">
        <div class="todo-widget">
            <p style="font-weight:bold; margin-bottom:10px; font-size:12px;">🔖 每日todo list</p>
            <div class="todo-item"><div class="todo-check"></div> 喝够8杯水 🥛</div>
            <div class="todo-item"><div class="todo-check"></div> 坚持运动30min 🏃</div>
            <div class="todo-item"><div class="todo-check"></div> 看书阅读30min 📚</div>
            <div class="todo-item"><div class="todo-check"></div> 记得记账 🔥</div>
            <div class="todo-item"><div class="todo-check"></div> 睡觉前复盘 📝</div>
        </div>

        <div class="icon-grid">
            <div class="app-icon"><div class="icon-shape">🗓</div>日历</div>
            <div class="app-icon"><div class="icon-shape">🖼</div>照片</div>
            <div class="app-icon"><div class="icon-shape">📷</div>相机</div>
            <div class="app-icon"><div class="icon-shape">☁️</div>天气</div>
        </div>

        <div class="icon-grid">
            <div class="app-icon"><div class="icon-shape">👤</div>通讯录</div>
            <div class="app-icon"><div class="icon-shape">🕒</div>时钟</div>
        </div>
        <div class="bottom-right-widget">
            <div style="font-size: 10px; position: absolute; right: 15px; top: 10px;">11月13日</div>
            <div style="width: 50px; height: 50px; background: #eee; border-radius: 10px; margin-top: 10px;"></div>
            <p style="font-size: 10px; margin-top: 5px;">北京 · 阴</p>
            <div style="font-size: 12px; margin-top: 5px; opacity: 0.5;">Top Widgets*</div>
        </div>
    </div>

    <div class="pagination">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="dock-bar">
        <div class="dock-icon" style="display:flex; align-items:center; justify-content:center;">📞</div>
        <div class="dock-icon" style="display:flex; align-items:center; justify-content:center;">⚙️</div>
    </div>
</div>

</body>
</html>
