<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS 仿真动态桌面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; }
        .phone-bg { width: 100vw; height: 100vh; background-size: cover; background-position: center; transition: background 0.5s; position: relative; }
        
        /* 滑动容器 */
        .swiper { display: flex; height: 100%; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .page { width: 100vw; flex-shrink: 0; padding: 50px 20px 20px 20px; box-sizing: border-box; }
        
        /* 毛玻璃组件 */
        .glass { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        
        /* 抖动动画 */
        .editing .icon-item { animation: shake 0.2s infinite alternate; }
        @keyframes shake { 0% { transform: rotate(-2deg); } 100% { transform: rotate(2deg); } }
        
        .todo-input { background: transparent; border: none; outline: none; width: 100%; font-size: 13px; color: #333; }
    </style>
</head>
<body>

<div class="phone-bg" id="bg-layer">
    <div class="absolute top-0 w-full flex justify-between px-6 pt-4 text-xs font-bold text-white z-50">
        <span id="time">09:41</span>
        <div class="flex items-center gap-1.5"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><span>79%</span></div>
    </div>

    <div class="absolute top-12 right-6 z-50 flex gap-2">
        <button onclick="addPage()" class="glass px-3 py-1 rounded-full text-[10px]">+</button>
        <button onclick="delPage()" class="glass px-3 py-1 rounded-full text-[10px]">-</button>
    </div>

    <div class="swiper" id="swiper"></div>

    <div class="absolute bottom-10 left-6 right-6 glass rounded-[35px] h-20 flex justify-around items-center text-white z-50">
        <div class="text-center text-[10px]"><i class="fas fa-cog text-xl mb-1"></i><br>设置</div>
        <div class="text-center text-[10px]"><i class="fas fa-globe text-xl mb-1"></i><br>时钟</div>
        <div class="text-center text-[10px]"><i class="fas fa-comment text-xl mb-1"></i><br>短信</div>
    </div>
</div>

<script>
    // 状态初始化
    let pages = JSON.parse(localStorage.getItem('iosPages')) || [1];
    let todos = JSON.parse(localStorage.getItem('iosTodos')) || ["喝够8杯水 🥛", "坚持运动30min 🏃", "看书阅读30min 📚", "记得记账 🔥", "睡觉前复盘 📝"];
    let bg = localStorage.getItem('bgUrl') || 'https://images.unsplash.com/photo-1519741497674-611481863552?q=80';
    document.getElementById('bg-layer').style.backgroundImage = `url('${bg}')`;

    function render() {
        const swiper = document.getElementById('swiper');
        swiper.style.width = (pages.length * 100) + 'vw';
        swiper.innerHTML = '';
        pages.forEach((p, i) => {
            const page = document.createElement('div');
            page.className = 'page';
            if (i === 0) {
                page.innerHTML = `
                    <div class="glass rounded-[30px] p-5 h-32 flex flex-col justify-between text-white">
                        <div class="flex justify-between"><span class="text-[10px] opacity-70">Top Widgets+</span><img src="${localStorage.getItem('avatar') || 'https://i.pravatar.cc/100'}" class="w-8 h-8 rounded-full border border-white/50 cursor-pointer" onclick="changeAvatar()"></div>
                        <div class="text-xs font-medium">词不达意是我们的通病</div>
                    </div>
                    <div class="glass rounded-[30px] p-6 mt-4 h-64">
                        <div class="text-xs font-bold mb-3 border-b border-white/30 pb-2"><i class="fas fa-bookmark mr-2"></i> 每日todo list</div>
                        <div id="todo-list" class="space-y-3"></div>
                    </div>
                    <div id="icon-grid" class="grid grid-cols-4 gap-y-6 mt-6"></div>
                `;
            } else {
                page.innerHTML = `<div class="text-white text-center pt-20 text-lg">页面 ${i + 1}</div>`;
            }
            swiper.appendChild(page);
        });
        renderIcons(); renderTodos();
    }

    function renderIcons() {
        const grid = document.getElementById('icon-grid');
        if(!grid) return;
        ['微信', '游戏', '小说', '小红书', '情侣空间', '查岗', '应用商店'].forEach(name => {
            grid.innerHTML += `
                <div class="icon-item flex flex-col items-center">
                    <div class="w-14 h-14 bg-white/40 rounded-2xl flex items-center justify-center mb-1"><i class="fas fa-star text-white"></i></div>
                    <span class="text-[9px] text-white">${name}</span>
                </div>
            `;
        });
        // 绑定拖拽
        new Sortable(grid, { animation: 150 });
        grid.onmousedown = () => setTimeout(() => document.body.classList.add('editing'), 800);
        window.onmouseup = () => document.body.classList.remove('editing');
    }

    function renderTodos() {
        const list = document.getElementById('todo-list');
        if(!list) return;
        list.innerHTML = '';
        todos.forEach((t, i) => {
            list.innerHTML += `<div class="flex items-center gap-2"><div class="w-4 h-4 rounded-full border border-gray-500"></div><input class="todo-input" value="${t}" onchange="updateTodo(${i}, this.value)"></div>`;
        });
    }

    function updateTodo(i, v) { todos[i] = v; localStorage.setItem('iosTodos', JSON.stringify(todos)); }
    function addPage() { pages.push(pages.length + 1); save(); render(); }
    function delPage() { if(pages.length > 1) { pages.pop(); save(); render(); } }
    function save() { localStorage.setItem('iosPages', JSON.stringify(pages)); }
    function changeAvatar() { const url = prompt("头像链接:"); if(url) { localStorage.setItem('avatar', url); render(); } }

    // 滑动交互
    let startX = 0, cur = 0;
    window.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    window.addEventListener('touchend', e => {
        let diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) {
            cur = diff > 0 ? Math.min(cur + 1, pages.length - 1) : Math.max(cur - 1, 0);
            document.getElementById('swiper').style.transform = `translateX(-${cur * 100}vw)`;
        }
    });

    setInterval(() => document.getElementById('time').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 1000);
    render();
</script>
</body>
</html>
