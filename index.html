<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimalist Phone UI</title>
    <style>
        :root {
            --bg-color: #F8F8F8;
            --card-bg: rgba(255, 255, 255, 0.7);
            --sketch-color: #999;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 375px;
            background: #F0F0F0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* 统一卡片样式 */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            backdrop-filter: blur(10px);
        }

        /* 顶部音乐模块 */
        .music-widget { margin-bottom: 20px; height: 80px; }

        /* 核心布局 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* 手绘风格图标辅助类 */
        .sketch-icon {
            width: 40px; height: 40px;
            border: 1px dashed var(--sketch-color);
            border-radius: 10px;
            margin-bottom: 5px;
            position: relative;
        }

        /* 待办事项 */
        .todo-list { padding: 15px; }
        .todo-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 12px; }
        .circle { width: 10px; height: 10px; border: 1px solid #999; border-radius: 50%; margin-right: 10px; }

        /* Dock栏 */
        .dock {
            position: fixed;
            bottom: 30px;
            width: 335px;
            height: 70px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="card music-widget"></div>

    <div class="main-grid">
        <div class="card">
            <div class="todo-item"><div class="circle"></div>喝够8杯水</div>
            <div class="todo-item"><div class="circle"></div>坚持运动30min</div>
            <div class="todo-item"><div class="circle"></div>看书阅读30min</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div style="text-align:center"><div class="sketch-icon"></div><small>日历</small></div>
            <div style="text-align:center"><div class="sketch-icon"></div><small>照片</small></div>
            <div style="text-align:center"><div class="sketch-icon"></div><small>相机</small></div>
            <div style="text-align:center"><div class="sketch-icon"></div><small>天气</small></div>
        </div>
    </div>

    <div class="dock">
        <div class="sketch-icon"></div>
        <div class="sketch-icon"></div>
    </div>
</div>

</body>
</html>
