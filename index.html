<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Style UI</title>
    <style>
        body { margin: 0; background: #d1d1d1; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

        .phone-container {
            width: 375px; height: 812px; background-color: #ffffff;
            border-radius: 50px; padding: 20px; box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; gap: 15px; overflow: hidden; position: relative;
        }

        /* 苹果风格状态栏 */
        .ios-status-bar {
            height: 44px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; font-size: 15px; font-weight: 600; color: #000;
        }
        .status-icons { display: flex; gap: 6px; align-items: center; }

        /* 其他布局保持不变 */
        .card { background: rgba(240, 240, 240, 0.8); backdrop-filter: blur(10px); border-radius: 30px; padding: 20px; }
        .top-card { height: 150px; }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .todo-list { grid-row: span 2; padding: 20px; font-size: 14px; }
        .icon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .icon { background: rgba(230, 230, 230, 0.6); height: 70px; border-radius: 20px; display: flex; justify-content: center; align-items: center; }
        .footer-card { height: 120px; }
        .dock { height: 90px; background: rgba(230, 230, 230, 0.9); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; margin-top: auto; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="ios-status-bar">
            <span>18:11</span>
            <div class="status-icons">
                <span>信号</span><span>WiFi</span><span>电池</span>
            </div>
        </div>

        <div class="card top-card">头像/歌词</div>
        <div class="main-content">
            <div class="card todo-list">每日todo list</div>
            <div class="icon-grid">
                <div class="icon">日历</div><div class="icon">照片</div>
                <div class="icon">相机</div><div class="icon">天气</div>
            </div>
        </div>
        <div class="card footer-card">日期/天气/图片</div>
        <div class="dock"><div>电话</div><div>其他</div></div>
    </div>

</body>
</html>
