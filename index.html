<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS 移动桌面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 移动端基础样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #e5e5e5;
            margin: 0;
            overflow: hidden; /* 禁止全局滚动，由桌面容器处理 */
            touch-action: none;
        }

        .mobile-viewport {
            width: 100vw;
            height: 100vh;
            background: #fdfdfd;
            position: relative;
            overflow: hidden;
        }

        /* 毛玻璃与层级处理 */
        .glass-ios {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* 左右滑动页面逻辑 */
        .swipe-wrapper {
            display: flex;
            width: 200vw;
            height: 100%;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }
        
        .page-content {
            width: 100vw;
            padding: 50px 20px 100px 20px;
        }

        /* 适配刘海屏 */
        .status-bar { height: 44px; }
        
        /* 闪粉质感微调 */
        .icon-box {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="mobile-viewport" id="app">
    <div class="absolute top-0 w-full px-6 flex justify-between items-center z-50 text-[13px] font-semibold text-gray-700 status-bar">
        <div id="time-display">09:41</div>
        <div class="flex items-center gap-1.5">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
            <div class="w-6 h-3 border border-gray-700 rounded-sm p-[1px]">
                <div class="bg-gray-700 h-full w-[70%]"></div>
            </div>
        </div>
    </div>

    <div class="swipe-wrapper" id="swipeWrapper">
        <div class="page-content">
            <div class="flex gap-4 mb-6">
                <div class="glass-ios p-4 rounded-3xl w-full">
                    <div class="flex items-center gap-2 mb-3">
                        <i class="fas fa-book text-gray-500"></i>
                        <span class="text-xs font-bold text-gray-600">每日todo list</span>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center gap-3 text-[11px] text-gray-500"><div class="w-4 h-4 rounded-full border border-gray-300"></div> 喝够8杯水 🥛</div>
                        <div class="flex items-center gap-3 text-[11px] text-gray-500"><div class="w-4 h-4 rounded-full border border-gray-300"></div> 坚持运动30min 🏃</div>
                        <div class="flex items-center gap-3 text-[11px] text-gray-500"><div class="w-4 h-4 rounded-full border border-gray-300"></div> 看书阅读30min 📚</div>
                        <div class="flex items-center gap-3 text-[11px] text-gray-500"><div class="w-4 h-4 rounded-full border border-gray-300"></div> 记得记账 🔥</div>
                        <div class="flex items-center gap-3 text-[11px] text-gray-500"><div class="w-4 h-4 rounded-full border border-gray-300"></div> 睡觉前复盘 📝</div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-y-6">
                <script>
                    const apps = ['微信', '游戏', '小说', '小红书', '情侣空间', '查岗', '应用商店'];
                    apps.forEach(name => {
                        document.write(`
                            <div class="flex flex-col items-center">
                                <div class="w-14 h-14 icon-box rounded-2xl flex items-center justify-center mb-1">
                                    <i class="fas fa-star text-gray-400"></i>
                                </div>
                                <span class="text-[10px] text-gray-500">${name}</span>
                            </div>
                        `);
                    });
                </script>
            </div>
        </div>

        <div class="page-content flex items-center justify-center text-gray-400">
            第二页：敬请期待
        </div>
    </div>

    <div class="absolute bottom-28 w-full flex justify-center gap-2">
        <div class="w-1.5 h-1.5 rounded-full bg-gray-500"></div>
        <div class="w-1.5 h-1.5 rounded-full bg-gray-300"></div>
    </div>

    <div class="absolute bottom-8 left-4 right-4 glass-ios p-3 rounded-3xl flex justify-around">
        <div class="text-center text-[10px] text-gray-500"><i class="fas fa-cog text-xl mb-1"></i><br>设置</div>
        <div class="text-center text-[10px] text-gray-500"><i class="fas fa-globe text-xl mb-1"></i><br>时钟</div>
        <div class="text-center text-[10px] text-gray-500"><i class="fas fa-comment text-xl mb-1"></i><br>短信</div>
    </div>
</div>

<script>
    // 移动端触摸逻辑
    let startX = 0;
    let currentPos = 0;
    const wrapper = document.getElementById('swipeWrapper');
    
    wrapper.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    wrapper.addEventListener('touchend', e => {
        let diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 100) {
            currentPos = diff > 0 ? -100 : 0;
            wrapper.style.transform = `translateX(${currentPos}vw)`;
        }
    });

    // 实时更新时间
    setInterval(() => {
        const d = new Date();
        document.getElementById('time-display').innerText = 
            d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
