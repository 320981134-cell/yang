<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仿手机网页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        /* 强制手机比例容器 */
        .phone-frame {
            width: 375px; 
            height: 812px;
            background: #ffffff;
            border-radius: 45px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 6px solid #1a1a1a;
            padding: 20px 15px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 25px;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="flex justify-between items-center px-4 py-2 text-xs font-bold text-gray-800 mb-2">
            <span>09:41</span>
            <div class="flex space-x-2 items-center">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <span>78%</span>
            </div>
        </div>

        <div class="glass-card p-4 h-36 flex flex-col justify-between mb-4">
            <div class="flex justify-between items-start">
                <div class="w-16 h-16 bg-gray-200 rounded-xl flex items-center justify-center">
                    <i class="fas fa-star text-white"></i>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-14 h-14 rounded-full bg-gray-300 overflow-hidden border-2 border-white shadow-sm">
                        </div>
                    <span class="text-[10px] text-gray-600 mt-1">郁宅雪</span>
                </div>
            </div>
            <div class="text-center text-xs text-gray-500 mt-1">词不达意是我们的通病</div>
            <div class="flex justify-center items-center space-x-6 text-gray-500 mt-2">
                <i class="fas fa-random text-[10px]"></i>
                <i class="fas fa-step-backward text-xs"></i>
                <i class="fas fa-pause-circle text-xl"></i>
                <i class="fas fa-step-forward text-xs"></i>
                <i class="fas fa-redo text-[10px]"></i>
            </div>
        </div>

        <div class="flex gap-4 h-56">
            <div class="glass-card flex-1 p-3 text-[10px] text-gray-600">
                <p class="font-bold mb-2">每日todo list</p>
                <div class="space-y-2">
                    <p>○ 喝够8杯水 🥛</p>
                    <p>○ 坚持运动30min 🏃</p>
                    <p>○ 看书阅读30min 📚</p>
                    <p>○ 记得记账 🔥</p>
                    <p>○ 睡前复盘 📝</p>
                </div>
            </div>
            <div class="flex-1 grid grid-cols-2 gap-2">
                <div class="flex flex-col items-center justify-center"><div class="w-12 h-12 glass-card"></div><span class="text-[9px] mt-1">日历</span></div>
                <div class="flex flex-col items-center justify-center"><div class="w-12 h-12 glass-card"></div><span class="text-[9px] mt-1">照片</span></div>
                <div class="flex flex-col items-center justify-center"><div class="w-12 h-12 glass-card"></div><span class="text-[9px] mt-1">相机</span></div>
                <div class="flex flex-col items-center justify-center"><div class="w-12 h-12 glass-card"></div><span class="text-[9px] mt-1">天气</span></div>
            </div>
        </div>

        <div class="flex-grow mt-4 flex gap-4">
            <div class="flex flex-col gap-4">
                <div class="flex flex-col items-center"><div class="w-12 h-12 glass-card rounded-full"></div><span class="text-[9px] mt-1">通讯录</span></div>
                <div class="flex flex-col items-center"><div class="w-12 h-12 glass-card"></div><span class="text-[9px] mt-1">时钟</span></div>
            </div>
            <div class="glass-card flex-grow p-4">
                <div class="flex justify-between items-center text-[10px]">
                    <div class="w-16 h-16 bg-white rounded-lg"></div>
                    <div class="text-right">
                        <p>11月13日</p>
                        <p class="border px-1 mt-2">北京 阴</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="h-20 glass-card mt-4 flex justify-around items-center">
            <div class="w-12 h-12 glass-card rounded-full"></div>
            <div class="w-12 h-12 glass-card rounded-full"></div>
        </div>
    </div>

</body>
</html>
